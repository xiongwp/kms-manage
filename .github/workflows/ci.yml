name: ci
on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kms-manage
    steps:
      - name: Checkout kms-manage
        uses: actions/checkout@v4
        with: { path: kms-manage }
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: kms-manage/go.sum
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -count=1 ./...
      # Lint 仍 non-blocking（cosmetic）；vuln scan 改为硬失败 — CVE 级问题
      # 不应混进 main。已知 false-positive 可在 govulncheck.yaml 加 ignore 规则。
      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: Lint
        continue-on-error: true
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          working-directory: kms-manage
          args: --timeout=5m
