# 起步 linter 集；后续可按需开 staticcheck / revive 严格规则。
run:
  timeout: 5m
linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - gosec
linters-settings:
  gosec:
    excludes:
      - G115   # int conversions; we vet manually
issues:
  exclude-rules:
    - path: _test\.go
      linters: [gosec]
