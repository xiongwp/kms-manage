# 通过 envFrom 注入；非敏感配置全在这里。USERMERCHANTCORE_ env 前缀已内建。
apiVersion: v1
kind: ConfigMap
metadata:
  name: kms-manage-config
data:
  USERMERCHANTCORE_SERVER_GRPC_PORT:    "9290"
  USERMERCHANTCORE_METRICS_ADDR:        ":9390"
  USERMERCHANTCORE_TIMEOUTS_DEFAULT:    "5s"
  USERMERCHANTCORE_OTEL_ENDPOINT:       "otel-collector.monitoring:4317"
  USERMERCHANTCORE_OTEL_SAMPLE_RATIO:   "0.1"
  USERMERCHANTCORE_OTEL_INSECURE:       "true"
  USERMERCHANTCORE_RETENTION_ENABLED:   "true"
  USERMERCHANTCORE_RETENTION_DURATION:  "61320h"   # 7y
  USERMERCHANTCORE_RETENTION_INTERVAL: "24h"
  USERMERCHANTCORE_RATE_LIMIT_PER_MERCHANT_DEFAULT_RPS: "100"
