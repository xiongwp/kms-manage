# HPA：CPU + p99 RPC latency 双维度。需要 metrics-server + prometheus-adapter
# 暴露 grpc_request_duration_seconds 才能用 Pods 维度的 metric。
# 起步阶段建议先只用 CPU；上量后接 p99 latency 防 saturation。
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kms-manage
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kms-manage
  minReplicas: 3
  maxReplicas: 30
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 min 防抖：避免周期性流量来回扩缩
      policies:
        - { type: Percent, value: 50, periodSeconds: 60 }
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - { type: Percent, value: 100, periodSeconds: 30 }
        - { type: Pods,    value: 4,   periodSeconds: 30 }
        - { type: Pods,    value: 4,   periodSeconds: 30 } # select max policy
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: 80 }
