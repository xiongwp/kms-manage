apiVersion: v1
kind: Service
metadata:
  name: kms-manage
  labels: { app: kms-manage }
spec:
  type: ClusterIP
  selector: { app: kms-manage }
  ports:
    - { name: grpc,    port: 9290, targetPort: grpc }
    - { name: metrics, port: 9390, targetPort: metrics }
---
# headless 副本：grpc-go 客户端的 dns:/// resolver 走它，可拿到所有 endpoints
# 做客户端 LB（avoid Service 单点 5-tuple-hash 偏分布）。
apiVersion: v1
kind: Service
metadata:
  name: kms-manage-headless
  labels: { app: kms-manage }
spec:
  clusterIP: None
  selector: { app: kms-manage }
  ports:
    - { name: grpc, port: 9290, targetPort: grpc }
