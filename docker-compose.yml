# kms-manage 本地栈：一个 gRPC 服务 + 一个挂载的 keystore 卷。
# 通过 external 网络 `payment-stack` 加入联栈，让兄弟服务用容器 DNS
# （kms-manage:9290）调到它。
#
# Dockerfile 自己 git-clone payment-util（需要 GITHUB_TOKEN secret）。
# 想拉 PR 分支覆盖默认 main，可加：
#   build:
#     args:
#       PAYMENT_UTIL_REF: claude/fix-payment-util-pvFNu
#
# 首次运行前在 host 上 bootstrap 一把密钥：
#   mkdir -p ./keys
#   docker compose run --rm --entrypoint /usr/local/bin/kmsctl kms init-key /var/lib/kms-manage/keys main
#
# 然后起服务：
#   docker compose up
networks:
  default:
    name: ${SHARED_DB_NETWORK:-payment-stack}
    external: true

services:
  kms:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - GITHUB_TOKEN
    image: kms-manage:local
    container_name: kms-manage
    restart: unless-stopped
    volumes:
      - ./keys:/var/lib/kms-manage/keys:ro
    ports:
      - "9290:9290" # gRPC
      - "9390:9390" # metrics + /healthz
    environment:
      KMS_LOG_DEV: "false"

# BuildKit secret：从环境变量读取 GITHUB_TOKEN，不写入镜像层。
# 用法：GITHUB_TOKEN=ghp_xxx docker compose build
# 若 payment-util 是公仓或本机 git 已登录，可以不设 GITHUB_TOKEN（Dockerfile
# 内部判断：secret 文件不存在就走无 token clone）。
secrets:
  GITHUB_TOKEN:
    environment: GITHUB_TOKEN
